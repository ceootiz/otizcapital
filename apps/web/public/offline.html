<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d0f12" />
    <title>OTIZ Capital</title>
    <style>
      :root { color-scheme: dark; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top, #252018 0, #0d0f12 45%); color: #f5f1e8; display: grid; place-items: center; padding: 24px; }
      main { width: min(680px, 100%); border: 1px solid #ffffff20; border-radius: 28px; background: #15171bdd; padding: clamp(24px, 5vw, 44px); box-shadow: 0 28px 80px #0008; }
      .brand { color: #d9b65d; font-size: 12px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; }
      h1 { margin: 14px 0 8px; font-size: clamp(28px, 6vw, 44px); line-height: 1.05; }
      p { color: #b7bac2; line-height: 1.65; }
      .updated { margin-top: 22px; font-size: 13px; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 24px; }
      .metric { border: 1px solid #ffffff18; border-radius: 18px; padding: 16px; }
      .metric span { display: block; color: #a6a9b0; font-size: 12px; }
      .metric strong { display: block; margin-top: 7px; font-size: 20px; }
      button { margin-top: 24px; min-height: 44px; border: 0; border-radius: 999px; background: #d9b65d; color: #111; padding: 0 20px; font-weight: 700; cursor: pointer; }
      @media (max-width: 460px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">OTIZ CAPITAL</div>
      <h1 id="title">You are offline</h1>
      <p id="description">The latest saved account summary is shown below. Documents and account actions remain unavailable until the connection returns.</p>
      <p class="updated" id="updated"></p>
      <div class="grid" id="metrics" hidden></div>
      <button id="retry" type="button">Try again</button>
    </main>
    <script>
      const copy = {
        en: { title: "You are offline", description: "The latest saved account summary is shown below. Documents and account actions remain unavailable until the connection returns.", updated: "Last updated", retry: "Try again", labels: ["Available", "Working capital", "Pending payouts", "Total capital"] },
        ru: { title: "Нет подключения", description: "Ниже показана последняя сохранённая сводка. Документы и действия со счётом недоступны до восстановления связи.", updated: "Обновлено", retry: "Повторить", labels: ["Доступно", "В работе", "Ожидает выплаты", "Общий капитал"] },
        de: { title: "Keine Verbindung", description: "Unten sehen Sie die zuletzt gespeicherte Kontoübersicht. Dokumente und Kontoaktionen bleiben bis zur Wiederherstellung der Verbindung nicht verfügbar.", updated: "Aktualisiert", retry: "Erneut versuchen", labels: ["Verfügbar", "Arbeitskapital", "Ausstehende Auszahlungen", "Gesamtkapital"] },
        es: { title: "Sin conexión", description: "A continuación se muestra el último resumen guardado. Los documentos y las acciones de la cuenta no están disponibles hasta recuperar la conexión.", updated: "Actualizado", retry: "Reintentar", labels: ["Disponible", "Capital en trabajo", "Pagos pendientes", "Capital total"] },
        zh: { title: "当前离线", description: "下方显示最近保存的账户汇总。恢复连接前，文件和账户操作均不可用。", updated: "更新时间", retry: "重试", labels: ["可用资金", "运作中资金", "待支付", "总资金"] }
      };
      let snapshot = null;
      try { snapshot = JSON.parse(localStorage.getItem("otiz-investor-offline-summary") || "null"); } catch {}
      const locale = snapshot?.locale && copy[snapshot.locale] ? snapshot.locale : "en";
      const t = copy[locale];
      document.documentElement.lang = locale;
      document.getElementById("title").textContent = t.title;
      document.getElementById("description").textContent = t.description;
      document.getElementById("retry").textContent = t.retry;
      document.getElementById("retry").onclick = () => location.reload();
      if (snapshot) {
        document.getElementById("updated").textContent = `${t.updated}: ${new Intl.DateTimeFormat(locale === "zh" ? "zh-CN" : locale, { dateStyle: "medium", timeStyle: "short" }).format(new Date(snapshot.updatedAt))}`;
        const values = [snapshot.availableBalance, snapshot.workingCapital, snapshot.pendingPayouts, snapshot.totalBalance];
        const metrics = document.getElementById("metrics");
        metrics.hidden = false;
        metrics.innerHTML = values.map((value, index) => `<div class="metric"><span>${t.labels[index]}</span><strong>${new Intl.NumberFormat(locale === "zh" ? "zh-CN" : locale, { style: "currency", currency: "USD", maximumFractionDigits: 2 }).format(Number(value || 0))}</strong></div>`).join("");
      }
    </script>
  </body>
</html>
